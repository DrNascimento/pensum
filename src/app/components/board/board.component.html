<div class="board-container">
  <div class="board-header">
    <h1 class="board-title">{{ boardName }}</h1>
  </div>
  <div class="board">
    <app-list *ngFor="let list of lists" [listName]="list"></app-list>
    <app-list-form
      *ngIf="showListForm"
      (onSave)="addList($event)"
      (onCancel)="showListForm = false"
    ></app-list-form>
    <button *ngIf="!showListForm" class="add-list-btn" (click)="showListForm = true">+</button>
  </div>
</div>
